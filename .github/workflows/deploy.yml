name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - run: npm test
    - name: Build
      run: npm run build || echo "No build script, skipping"
    - name: Deploy
      run: echo "Deployment step - configure as needed"
